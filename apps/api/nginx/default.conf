worker_processes auto;

events {
  worker_connections 1024;
}

http {
  server_tokens off;

  log_format structured_json escape=json
    '{"time":"$time_iso8601","remote_addr":"$remote_addr","request_id":"$request_id","method":"$request_method","uri":"$request_uri","status":$status,"bytes_sent":$bytes_sent,"request_time":$request_time,"upstream_time":"$upstream_response_time","user_agent":"$http_user_agent"}';

  access_log /var/log/nginx/access.log structured_json;
  error_log /var/log/nginx/error.log warn;

  limit_req_zone $binary_remote_addr zone=api_req_limit:10m rate=20r/s;
  limit_conn_zone $binary_remote_addr zone=api_conn_limit:10m;

  map $http_user_agent $blocked_user_agent {
    default 0;
    ~*(sqlmap|nikto|nmap|masscan|dirbuster|wpscan|acunetix) 1;
  }

  map $request_uri $blocked_uri {
    default 0;
    ~*(\.\./|%2e%2e|/etc/passwd|<script|union\s+select) 1;
  }

  server {
    listen 8080;
    client_max_body_size 2m;

    if ($blocked_user_agent = 1) {
      return 403;
    }

    if ($blocked_uri = 1) {
      return 403;
    }

    location / {
      limit_req zone=api_req_limit burst=40 nodelay;
      limit_conn api_conn_limit 30;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $request_id;

      proxy_connect_timeout 3s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;

      proxy_pass http://host.docker.internal:3000;
    }

    location = /healthz {
      add_header Content-Type text/plain;
      return 200 'ok';
    }
  }
}
